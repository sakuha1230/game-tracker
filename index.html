  function addPull(g){
    var dateInput = document.getElementById('newPullDate');
    var rarityInput = document.getElementById('newPullRarity');
    var nameInput = document.getElementById('newPullName');
    var bannerInput = document.getElementById('newPullBanner');
    var rarity = rarityInput.value.trim();
    if(!rarity) return;
    g.pullLog.unshift({
      id: uid(),
      dateStr: dateInput.value || todayStr(),
      rarity: rarity,
      name: nameInput.value.trim(),
      bannerName: bannerInput.value.trim()
    });
    saveState();
    renderGachaSection(g);
  }

  function renderSpendingSection(g){
    var panel = document.getElementById('section_spending');
    if(!panel) return;

    var now = new Date();
    var curMonthKey = now.getFullYear() + '-' + pad2(now.getMonth()+1);
    var curYearKey = String(now.getFullYear());
    var monthTotal = 0, yearTotal = 0, allTotal = 0;
    g.spendingLog.forEach(function(s){
      var amt = parseFloat(s.amount) || 0;
      allTotal += amt;
      if((s.dateStr||'').indexOf(curMonthKey) === 0) monthTotal += amt;
      if((s.dateStr||'').indexOf(curYearKey) === 0) yearTotal += amt;
    });

    var logHtml = '';
    if(g.spendingLog.length === 0){
      logHtml = '<div class="empty-hint">還沒有課金紀錄，點右上角新增一筆。</div>';
    } else {
      var sorted = g.spendingLog.slice().sort(function(a,b){ return (b.dateStr||'').localeCompare(a.dateStr||''); });
      sorted.forEach(function(s){
        logHtml +=
          '<div class="spend-item">' +
            '<span class="spend-date">' + (s.dateStr||'').replace(/-/g,'/') + '</span>' +
            (s.category ? '<span class="spend-category">' + escapeHtml(s.category) + '</span>' : '') +
            '<span class="spend-note">' + escapeHtml(s.note || '') + '</span>' +
            '<span class="spend-amount">$' + formatMoney(parseFloat(s.amount)||0) + '</span>' +
            '<button class="spend-del" data-action="delete-spend" data-id="' + s.id + '">×</button>' +
          '</div>';
      });
    }

    panel.innerHTML =
      '<div class="panel-box">' +
        '<div class="panel-box-title">' + pbtLabel('wallet','課金紀錄') + '<button class="add-fab" id="fabSpend">' + icon('plus',18) + '</button></div>' +
        '<div class="add-form hidden" id="formSpend">' +
          '<div class="add-form-row">' +
            '<input type="date" id="newSpendDate" value="' + todayStr() + '" style="flex-shrink:0;">' +
            '<input type="text" id="newSpendAmount" placeholder="金額" inputmode="decimal" style="max-width:100px;">' +
          '</div>' +
          '<div class="add-form-row">' +
            '<input type="text" id="newSpendCategory" placeholder="分類，例如：活動、月卡（選填）">' +
          '</div>' +
          '<div class="add-form-row">' +
            '<input type="text" id="newSpendNote" placeholder="備註，例如：買了限定卡池">' +
          '</div>' +
          '<div class="add-form-actions">' +
            '<button class="btn-cancel-inline" id="cancelSpendBtn">取消</button>' +
            '<button class="btn-confirm" id="addSpendBtn">新增</button>' +
          '</div>' +
        '</div>' +
        '<div class="spend-stats-grid">' +
          '<div class="spend-stat-box"><div class="spend-stat-num">$' + formatMoney(monthTotal) + '</div><div class="spend-stat-label">本月花費</div></div>' +
          '<div class="spend-stat-box"><div class="spend-stat-num">$' + formatMoney(yearTotal) + '</div><div class="spend-stat-label">本年花費</div></div>' +
          '<div class="spend-stat-box"><div class="spend-stat-num">$' + formatMoney(allTotal) + '</div><div class="spend-stat-label">總花費</div></div>' +
        '</div>' +
        '<div id="spendLogArea">' + logHtml + '</div>' +
      '</div>';

    wireAddToggle('fabSpend', 'formSpend');
    document.getElementById('cancelSpendBtn').addEventListener('click', function(){ document.getElementById('formSpend').classList.add('hidden'); });
    document.getElementById('addSpendBtn').addEventListener('click', function(){ addSpend(g); });
    document.getElementById('newSpendAmount').addEventListener('keydown', function(e){ if(e.key==='Enter') addSpend(g); });
    panel.querySelectorAll('[data-action="delete-spend"]').forEach(function(el){
      el.addEventListener('click', function(){
        var id = el.getAttribute('data-id');
        g.spendingLog = g.spendingLog.filter(function(x){return x.id!==id;});
        saveState();
        renderSpendingSection(g);
      });
    });
  }

  function addSpend(g){
    var dateInput = document.getElementById('newSpendDate');
    var amountInput = document.getElementById('newSpendAmount');
    var categoryInput = document.getElementById('newSpendCategory');
    var noteInput = document.getElementById('newSpendNote');
    var amount = parseFloat(amountInput.value);
    if(isNaN(amount)) return;
    g.spendingLog.push({
      id: uid(),
      dateStr: dateInput.value || todayStr(),
      amount: amount,
      category: categoryInput.value.trim(),
      note: noteInput.value.trim()
    });
    saveState();
    renderSpendingSection(g);
  }

  function renderNotesSection(g){
    var panel = document.getElementById('section_notes');
    if(!panel) return;
    panel.innerHTML = memoSectionSkeleton('自由筆記', 'fabGameNote', 'note');
    var containerEl = panel.querySelector('.panel-box');

    renderMemoList(containerEl, g.notes, function(newArr){
      g.notes = newArr;
      saveState();
    });

    document.getElementById('fabGameNote').addEventListener('click', function(){
      openMemoEditor(containerEl, g.notes, null, function(newArr){
        g.notes = newArr;
        saveState();
      });
    });
  }

  function renderGameLogSection(g){
    var panel = document.getElementById('section_gamelog');
    if(!panel) return;
    panel.innerHTML =
      '<div class="panel-box">' +
        '<div class="panel-box-title">' + pbtLabel('calendar','遊戲日誌') + '<button class="add-fab" id="fabGameLog">' + icon('plus',18) + '</button></div>' +
        '<div class="add-form hidden" id="formGameLog">' +
          '<div class="log-add-row">' +
            '<input type="date" id="newLogDate" value="' + todayStr() + '">' +
            '<input type="text" id="newLogText" placeholder="記錄這天發生的事">' +
          '</div>' +
          '<div class="add-form-actions">' +
            '<button class="btn-cancel-inline" id="cancelGameLogBtn">取消</button>' +
            '<button class="btn-confirm" id="addGameLogBtn">新增</button>' +
          '</div>' +
        '</div>' +
        '<div id="gameLogListArea"></div>' +
      '</div>';

    renderGameLogList(g);

    wireAddToggle('fabGameLog', 'formGameLog');
    document.getElementById('cancelGameLogBtn').addEventListener('click', function(){ document.getElementById('formGameLog').classList.add('hidden'); });
    document.getElementById('addGameLogBtn').addEventListener('click', function(){ addGameLog(g); });
    document.getElementById('newLogText').addEventListener('keydown', function(e){ if(e.key==='Enter') addGameLog(g); });
  }

  function renderGameLogList(g){
    var area = document.getElementById('gameLogListArea');
    if(g.gameLog.length === 0){
      area.innerHTML = '<div class="empty-hint">還沒有日誌，狀態變更時會自動記錄，也可以點右上角手動新增。</div>';
      return;
    }
    var sorted = g.gameLog.slice().sort(function(a,b){ return (b.dateStr||'').localeCompare(a.dateStr||''); });
    var html = '<div class="journal-list">';
    sorted.forEach(function(l){
      html +=
        '<div class="journal-item" data-log-id="' + l.id + '">' +
          '<div class="journal-item-row">' +
            '<span class="journal-date">' + formatDateJournal(l.dateStr) + '</span>' +
            (l.auto ? '<span class="journal-auto-tag">自動</span>' : '') +
            '<span class="journal-text" data-role="log-view-text">' + escapeHtml(l.text) + '</span>' +
          '</div>' +
          '<div class="journal-item-actions">' +
            '<button class="history-mini-btn" data-action="edit-log" data-id="' + l.id + '">編輯</button>' +
            '<button class="history-mini-btn danger" data-action="delete-log" data-id="' + l.id + '">刪除</button>' +
          '</div>' +
        '</div>';
    });
    html += '</div>';
    area.innerHTML = html;

    area.querySelectorAll('[data-action="delete-log"]').forEach(function(el){
      el.addEventListener('click', function(){
        var id = el.getAttribute('data-id');
        g.gameLog = g.gameLog.filter(function(x){return x.id!==id;});
        saveState();
        renderGameLogList(g);
      });
    });
    area.querySelectorAll('[data-action="edit-log"]').forEach(function(el){
      el.addEventListener('click', function(){
        var id = el.getAttribute('data-id');
        var entry = g.gameLog.filter(function(x){return x.id===id;})[0];
        if(!entry) return;
        var itemEl = area.querySelector('.journal-item[data-log-id="' + id + '"]');
        itemEl.innerHTML =
          '<div class="log-add-row">' +
            '<input type="date" class="log-edit-date" value="' + entry.dateStr + '">' +
            '<input type="text" class="log-edit-text" value="' + escapeHtml(entry.text) + '">' +
          '</div>' +
          '<div class="journal-item-actions">' +
            '<button class="history-mini-btn" data-action="save-log-edit" data-id="' + id + '">儲存</button>' +
            '<button class="history-mini-btn" data-action="cancel-log-edit">取消</button>' +
          '</div>';
        itemEl.querySelector('[data-action="save-log-edit"]').addEventListener('click', function(){
          var newDate = itemEl.querySelector('.log-edit-date').value || entry.dateStr;
          var newText = itemEl.querySelector('.log-edit-text').value.trim();
          if(!newText) return;
          entry.dateStr = newDate;
          entry.text = newText;
          entry.auto = false;
          saveState();
          renderGameLogList(g);
        });
        itemEl.querySelector('[data-action="cancel-log-edit"]').addEventListener('click', function(){
          renderGameLogList(g);
        });
      });
    });
  }

  function addGameLog(g){
    var dateInput = document.getElementById('newLogDate');
    var textInput = document.getElementById('newLogText');
    var text = textInput.value.trim();
    if(!text) return;
    g.gameLog.unshift({ id: uid(), dateStr: dateInput.value || todayStr(), text: text, auto: false });
    saveState();
    renderGameLogList(g);
    textInput.value = '';
  }

  var addModal = document.getElementById('addModal');
  var newGameNameInput = document.getElementById('newGameNameInput');
  var selectedPlatform = 'console';

  function renderPlatformPickInto(elId, currentValue, onPick){
    var el = document.getElementById(elId);
    el.innerHTML = '';
    PLATFORMS.forEach(function(p){
      var opt = document.createElement('div');
      opt.className = 'platform-pick-opt' + (currentValue === p.key ? ' selected' : '');
      opt.textContent = p.label;
      opt.addEventListener('click', function(){ onPick(p.key); });
      el.appendChild(opt);
    });
  }

  function renderPlatformPick(){
    renderPlatformPickInto('platformPick', selectedPlatform, function(key){
      selectedPlatform = key;
      renderPlatformPick();
    });
  }

  function openAddModal(){
    addModal.classList.remove('hidden');
    newGameNameInput.value = '';
    selectedPlatform = (state.filterPlatform !== 'all') ? state.filterPlatform : 'console';
    renderPlatformPick();
    setTimeout(function(){ newGameNameInput.focus(); }, 0);
  }
  document.getElementById('cancelAddBtn').addEventListener('click', function(){ addModal.classList.add('hidden'); });
  addModal.addEventListener('click', function(e){ if(e.target === addModal) addModal.classList.add('hidden'); });
  function submitNewGame(){
    var name = newGameNameInput.value.trim();
    if(!name) return;
    var newGame = makeGame(name, selectedPlatform);
    state.games.push(newGame);
    saveState();
    addModal.classList.add('hidden');
    goToGame(newGame.id);
  }
  document.getElementById('confirmAddBtn').addEventListener('click', submitNewGame);
  newGameNameInput.addEventListener('keydown', function(e){ if(e.key === 'Enter') submitNewGame(); });

  var editModal = document.getElementById('editModal');
  var editGameNameInput = document.getElementById('editGameNameInput');
  var editDailyResetTimeInput = document.getElementById('editDailyResetTimeInput');
  var editDailyResetTimeField = document.getElementById('editDailyResetTimeField');
  var editSelectedPlatform = 'console';
  var editingGameId = null;

  function renderEditPlatformPick(){
    renderPlatformPickInto('editPlatformPick', editSelectedPlatform, function(key){
      editSelectedPlatform = key;
      renderEditPlatformPick();
      updateEditResetTimeVisibility();
    });
  }
  function updateEditResetTimeVisibility(){
    var grp = platformGroup(editSelectedPlatform);
    if(grp === 'mobile' || grp === 'otome_mobile'){
      editDailyResetTimeField.classList.remove('hidden');
    } else {
      editDailyResetTimeField.classList.add('hidden');
    }
  }

  function openEditModal(g){
    editingGameId = g.id;
    editGameNameInput.value = g.name;
    editSelectedPlatform = g.platform;
    editDailyResetTimeInput.value = g.dailyResetTime || '00:00';
    renderEditPlatformPick();
    updateEditResetTimeVisibility();
    editModal.classList.remove('hidden');
  }
  document.getElementById('cancelEditBtn').addEventListener('click', function(){ editModal.classList.add('hidden'); });
  editModal.addEventListener('click', function(e){ if(e.target === editModal) editModal.classList.add('hidden'); });
  document.getElementById('confirmEditBtn').addEventListener('click', function(){
    var name = editGameNameInput.value.trim();
    if(!name || !editingGameId) return;
    var g = state.games.filter(function(x){return x.id===editingGameId;})[0];
    if(!g) return;
    var oldGroup = platformGroup(g.platform);
    var newGroup = platformGroup(editSelectedPlatform);
    g.name = name;
    g.platform = editSelectedPlatform;
    g.dailyResetTime = editDailyResetTimeInput.value || '00:00';
    if(oldGroup !== newGroup){
      g.sectionOrder = defaultSectionOrderFor(newGroup);
    }
    saveState();
    editModal.classList.add('hidden');
    renderGameView();
  });

  var deleteModal = document.getElementById('deleteModal');
  var pendingDeleteId = null;
  function openDeleteModal(g){
    pendingDeleteId = g.id;
    document.getElementById('deleteConfirmText').textContent = '確定要刪除「' + g.name + '」的所有進度與筆記嗎？此操作無法復原。';
    deleteModal.classList.remove('hidden');
  }
  document.getElementById('cancelDeleteBtn').addEventListener('click', function(){ deleteModal.classList.add('hidden'); pendingDeleteId = null; });
  deleteModal.addEventListener('click', function(e){ if(e.target === deleteModal){ deleteModal.classList.add('hidden'); pendingDeleteId = null; } });
  document.getElementById('confirmDeleteBtn').addEventListener('click', function(){
    if(!pendingDeleteId) return;
    state.games = state.games.filter(function(g){ return g.id !== pendingDeleteId; });
    pendingDeleteId = null;
    saveState();
    deleteModal.classList.add('hidden');
    goHome();
  });

  goHome();

  function wireFirebaseAuth(){
    if(!window.__fb) return;
    window.__fb.onAuthStateChanged(function(user){
      cloudUser = user;
      if(user){ startCloudListener(user); } else { stopCloudListener(); }
      renderDrawerAuth();
    });
  }
  if(window.__fb){ wireFirebaseAuth(); }
  else { window.addEventListener('fb-ready', wireFirebaseAuth, { once: true }); }
})();

</script>
</body>
</html>
