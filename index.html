<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>存檔本 · 遊戲進度與筆記</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;700;900&display=swap');

  :root{
    --bg: #10171a;
    --bg-raised: #1c2a2e;
    --bg-raised-2: #223338;
    --line: #26363b;
    --line-bright: #35494f;
    --ink: #e8f1f0;
    --ink-dim: #93a8a8;
    --ink-faint: #56696c;
    --accent: #4fd6c4;
    --accent-dim: #2f8f82;
    --accent-soft: rgba(79,214,196,.14);
    --sapphire: #6d9bf2;
    --amber: #f0b855;
    --rose: #ea7c94;
    --violet: #a78cf2;
    --pink: #f0a8cc;
    --danger: #ea7c94;
  }

  *{ box-sizing: border-box; }
  html,body{ margin:0; padding:0; }
  body{
    background:
      radial-gradient(1100px 560px at 10% -8%, #17272a 0%, transparent 58%),
      radial-gradient(1000px 520px at 105% 5%, #142526 0%, transparent 55%),
      var(--bg);
    color: var(--ink);
    font-family: 'Noto Sans TC', 'Space Grotesk', -apple-system, sans-serif;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  .display{ font-family: 'Space Grotesk', 'Noto Sans TC', sans-serif; }
  ::selection{ background: var(--accent); color: #0a1214; }
  ::-webkit-scrollbar{ width: 10px; height: 10px; }
  ::-webkit-scrollbar-track{ background: transparent; }
  ::-webkit-scrollbar-thumb{ background: var(--line-bright); border-radius: 6px; }

  .app{ max-width: 900px; margin: 0 auto; padding: 18px 16px 80px; }

  .home-header{
    display:flex; align-items:center; justify-content:space-between;
    gap: 12px; flex-wrap: wrap;
    padding: 12px 4px 18px;
    margin-bottom: 18px;
  }
  .home-header-left{ display:flex; align-items:center; gap: 12px; min-width:0; }
  .hamburger-btn{
    width: 42px; height: 42px; flex-shrink:0;
    background: var(--bg-raised); border: 1px solid var(--line); border-radius: 11px;
    cursor: pointer; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:4px;
    transition: border-color .15s ease, transform .15s ease;
  }
  .hamburger-btn:hover{ border-color: var(--accent); }
  .hamburger-btn:active{ transform: scale(0.95); }
  .hamburger-btn span{ width: 18px; height: 2px; background: var(--ink-dim); border-radius: 1px; transition: background .15s ease; }
  .hamburger-btn:hover span{ background: var(--accent); }

  .brand-title{ font-size: 17px; font-weight: 700; letter-spacing: 0.3px; margin: 0; }
  .brand-sub{ margin:0; color: var(--ink-faint); font-size: 12px; }

  .platform-filter{ display:flex; flex-wrap:wrap; gap:6px; margin-bottom: 16px; }
  .filter-chip{
    font-size: 11px; padding: 6px 12px; border-radius: 20px; border: 1px solid var(--line);
    color: var(--ink-faint); cursor:pointer; background: var(--bg-raised); font-family: inherit;
    transition: all .15s ease;
  }
  .filter-chip:hover{ border-color: var(--line-bright); color: var(--ink-dim); }
  .filter-chip.active{ border-color: var(--accent); color: var(--accent); background: var(--accent-soft); }

  .home-grid{ display:flex; flex-direction:column; gap: 10px; }
  .overview-card{
    background: var(--bg-raised); border: 1px solid var(--line); border-radius: 14px;
    padding: 14px 16px; cursor: pointer; transition: border-color .15s ease, transform .1s ease;
    position: relative; overflow: hidden;
  }
  .overview-card:hover{ border-color: var(--line-bright); }
  .overview-card:active{ transform: scale(0.995); }
  .overview-top{ display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom: 6px; }
  .overview-name-wrap{ display:flex; align-items:center; gap:9px; min-width:0; }
  .overview-name{ font-size: 15px; font-weight: 700; color: var(--ink); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .overview-platform-tag{ font-size: 10px; color: var(--ink-faint); flex-shrink:0; }
  .overview-status{ font-size: 10px; padding: 3px 9px; border-radius: 20px; white-space:nowrap; flex-shrink:0; font-weight: 600; }
  .status-playing{ background: rgba(79,214,196,.16); color: var(--accent); }
  .status-paused{ background: rgba(240,184,85,.16); color: var(--amber); }
  .status-done{ background: rgba(167,140,242,.16); color: var(--violet); }
  .status-backlog{ background: rgba(147,168,168,.16); color: var(--ink-dim); }

  .overview-sub{ font-size: 12px; color: var(--ink-dim); margin-bottom: 8px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .progress-track{ height: 4px; background: var(--line); border-radius: 2px; overflow:hidden; margin-bottom: 8px; }
  .progress-fill{ height:100%; background: linear-gradient(90deg, var(--accent-dim), var(--accent)); }

  .overview-badge-row{ display:flex; flex-wrap:wrap; gap: 6px; }
  .overview-badge{
    font-size: 10px; padding: 3px 9px; border-radius: 20px; display:inline-flex; align-items:center; gap:4px;
  }
  .overview-badge.daily{ color: var(--rose); background: rgba(234,124,148,.12); }
  .overview-badge.event-urgent{ color: var(--rose); background: rgba(234,124,148,.16); }
  .overview-badge.event-soon{ color: var(--amber); background: rgba(240,184,85,.16); }
  .overview-badge.event-normal{ color: var(--accent); background: rgba(79,214,196,.12); }

  .add-game-btn{
    width:100%; margin-top: 4px; padding: 14px; background: transparent;
    border: 1.5px dashed var(--line-bright); color: var(--ink-faint); border-radius: 14px;
    font-size: 13px; cursor: pointer; font-family: inherit; transition: all .15s ease;
  }
  .add-game-btn:hover{ border-color: var(--accent); color: var(--accent); }
  .empty-hint{ text-align:center; padding: 30px 10px; color: var(--ink-faint); font-size:13px; }

  .empty-state{ text-align:center; padding: 90px 20px; color: var(--ink-faint); }
  .empty-state-title{ font-size: 15px; color: var(--ink-dim); margin-bottom: 12px; font-weight: 700; }

  .drawer-overlay{
    position: fixed; inset: 0; background: rgba(6,10,11,.65); z-index: 60;
    opacity: 0; pointer-events: none; transition: opacity .2s ease;
  }
  .drawer-overlay.open{ opacity: 1; pointer-events: auto; }
  .drawer{
    position: fixed; top:0; left:0; bottom:0; width: 310px; max-width: 88vw;
    background: var(--bg-raised); border-right: 1px solid var(--line-bright);
    z-index: 61; transform: translateX(-100%); transition: transform .25s cubic-bezier(.2,.8,.2,1);
    display:flex; flex-direction:column;
  }
  .drawer.open{ transform: translateX(0); }

  .drawer-auth{
    padding: 18px 16px; background: linear-gradient(160deg, rgba(79,214,196,.1), transparent);
    border-bottom: 1px solid var(--line);
  }
  .drawer-auth-signedout{ text-align:center; }
  .drawer-auth-signedout p{ font-size: 12px; color: var(--ink-faint); margin: 0 0 12px; }
  .google-signin-btn{
    width: 100%; background: var(--ink); color: #0a1214; border:none; padding: 11px;
    border-radius: 10px; font-size: 13px; font-weight: 700; cursor:pointer; font-family: inherit;
    display:flex; align-items:center; justify-content:center; gap:8px;
  }
  .google-signin-btn:hover{ background: #fff; }
  .drawer-auth-signedin{ display:flex; align-items:center; gap: 10px; }
  .drawer-auth-signedin img{ width:36px; height:36px; border-radius:50%; flex-shrink:0; }
  .drawer-auth-info{ flex:1; min-width:0; }
  .drawer-auth-name{ font-size: 13px; font-weight:700; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .sync-badge{ font-size: 9px; padding: 2px 7px; border-radius: 20px; display:inline-block; margin-top:3px; }
  .sync-badge.synced{ background: rgba(79,214,196,.15); color: var(--accent); }
  .sync-badge.local{ background: rgba(147,168,168,.15); color: var(--ink-dim); }
  .sync-badge.syncing{ background: rgba(240,184,85,.15); color: var(--amber); }
  .drawer-signout-btn{
    background:none; border: 1px solid var(--line); color: var(--ink-faint); font-size: 11px;
    padding: 6px 10px; border-radius: 8px; cursor:pointer; font-family: inherit; flex-shrink:0;
  }
  .drawer-signout-btn:hover{ border-color: var(--danger); color: var(--danger); }

  .drawer-header{ display:flex; align-items:center; justify-content:space-between; padding: 14px 16px 10px; }
  .drawer-header h2{ font-size: 11px; letter-spacing: 1px; color: var(--ink-faint); margin:0; text-transform: uppercase; }
  .drawer-close{
    width: 30px; height:30px; background:none; border:1px solid var(--line); color: var(--ink-dim);
    border-radius: 8px; cursor:pointer; font-size: 14px;
  }
  .drawer-close:hover{ border-color: var(--rose); color: var(--rose); }
  .drawer-body{ flex:1; overflow-y: auto; padding: 0 16px 16px; }

  .drawer-nav-btn{
    width:100%; text-align:left; background: none; border: none; color: var(--ink);
    padding: 10px 8px; border-radius: 8px; cursor:pointer; font-size: 13px; font-family: inherit;
    display:flex; align-items:center; gap:8px; margin-bottom: 4px;
  }
  .drawer-nav-btn:hover{ background: var(--bg-raised-2); }

  .game-card{
    display:flex; flex-direction:column; gap:6px; padding: 10px 10px; border-radius: 10px;
    border: 1px solid transparent; cursor: pointer; margin-bottom: 6px;
    transition: background .12s ease, border-color .12s ease; position: relative;
  }
  .game-card:hover{ background: var(--bg-raised-2); }
  .game-card.active{ background: var(--bg-raised-2); border-color: var(--line-bright); }
  .game-card-top{ display:flex; align-items:center; justify-content:space-between; gap:8px; }
  .game-name-wrap{ display:flex; align-items:center; gap:6px; min-width:0; }
  .platform-dot{ width:7px; height:7px; border-radius:50%; flex-shrink:0; }
  .game-name{ font-size: 13px; font-weight:600; color: var(--ink); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }

  .game-topbar{
    display:flex; align-items:center; gap: 10px; margin-bottom: 14px;
  }
  .back-btn{
    width: 36px; height: 36px; flex-shrink:0; background: var(--bg-raised); border: 1px solid var(--line);
    border-radius: 10px; cursor:pointer; display:flex; align-items:center; justify-content:center;
    color: var(--ink-dim); font-size: 16px; transition: all .15s ease;
  }
  .back-btn:hover{ border-color: var(--accent); color: var(--accent); }
  .game-topbar-title{ font-size: 13px; color: var(--ink-faint); flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }

  .game-hero{
    background: var(--bg-raised); border: 1px solid var(--line); border-radius: 16px;
    padding: 20px 20px 18px; margin-bottom: 16px;
  }
  .game-hero-top{ display:flex; justify-content:space-between; align-items:flex-start; gap: 12px; flex-wrap: wrap; }
  .game-hero-title-block{ flex:1; min-width:0; }
  .game-title-display{ font-size: 20px; font-weight: 700; color: var(--ink); margin: 0 0 8px; line-height:1.3; }
  .game-hero-tags{ display:flex; align-items:center; gap: 8px; flex-wrap: wrap; }
  .platform-badge{
    font-size: 10px; padding: 3px 10px; border-radius: 20px; font-weight:600;
  }
  .game-hero-actions{ display:flex; gap:6px; flex-shrink:0; }
  .icon-btn{
    background: none; border: 1px solid var(--line); color: var(--ink-dim);
    width: 34px; height:34px; border-radius:10px; cursor:pointer;
    display:flex; align-items:center; justify-content:center; font-size: 14px; flex-shrink:0;
    transition: all .15s ease;
  }
  .icon-btn:hover{ border-color: var(--accent); color: var(--accent); }
  .icon-btn.danger:hover{ border-color: var(--danger); color: var(--danger); }

  .hero-event-strip{
    margin-top: 14px; padding: 10px 14px; border-radius: 10px;
    background: linear-gradient(90deg, rgba(234,124,148,.12), transparent);
    border: 1px solid rgba(234,124,148,.25);
    display:flex; align-items:center; justify-content:space-between; gap:10px; flex-wrap: wrap;
  }
  .hero-event-strip.soon{ background: linear-gradient(90deg, rgba(240,184,85,.12), transparent); border-color: rgba(240,184,85,.25); }
  .hero-event-strip.normal{ background: linear-gradient(90deg, rgba(79,214,196,.1), transparent); border-color: rgba(79,214,196,.22); }
  .hero-event-name{ font-size: 13px; font-weight: 600; }
  .hero-event-days{ font-size: 11px; padding: 3px 10px; border-radius: 20px; white-space:nowrap; }

  .progress-block{ margin-top: 16px; }
  .progress-label-row{ display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; }
  .progress-label-row span{ font-size: 12px; color: var(--ink-dim); }
  .progress-pct{ font-size: 13px; font-weight: 700; color: var(--accent); }
  .progress-bar-lg{ height: 8px; background: var(--line); border-radius: 5px; overflow:hidden; }
  .progress-bar-lg .progress-fill{ height:100%; border-radius:5px; }
  input[type=range]{ width:100%; margin-top:8px; accent-color: var(--accent); }

  .tabs{ display:flex; gap:4px; margin-bottom: 14px; overflow-x:auto; padding-bottom: 2px; }
  .tab{
    padding: 8px 14px; font-size: 12px; color: var(--ink-faint); cursor:pointer;
    border-radius: 20px; user-select:none; display:flex; align-items:center; gap:6px;
    white-space:nowrap; flex-shrink:0; background: var(--bg-raised); border: 1px solid transparent;
    transition: all .15s ease;
  }
  .tab:hover{ color: var(--ink-dim); }
  .tab.active{ color: var(--accent); background: var(--accent-soft); border-color: rgba(79,214,196,.3); }
  .tab-count{ font-size: 10px; opacity: 0.75; }

  .tab-panel{ display:none; }
  .tab-panel.active{ display:block; }

  .panel-box{ background: var(--bg-raised); border:1px solid var(--line); border-radius:14px; padding: 16px; margin-bottom: 14px; }
  .panel-box:last-child{ margin-bottom: 0; }
  .panel-box-title{ font-size: 12px; letter-spacing: .3px; color: var(--ink); margin: 0 0 12px; font-weight: 700; display:flex; align-items:center; gap:8px; justify-content: space-between; }

  .add-fab{
    width: 32px; height:32px; border-radius: 50%; background: var(--accent); color:#0a1214;
    border:none; font-size: 18px; cursor:pointer; display:flex; align-items:center; justify-content:center;
    font-weight:700; transition: transform .15s ease;
    flex-shrink: 0;
  }
  .add-fab:hover{ transform: scale(1.08); }
  .add-form{
    background: var(--bg-raised-2); border: 1px solid var(--line-bright); border-radius: 12px;
    padding: 12px; margin-bottom: 12px; display:flex; flex-direction:column; gap:8px;
  }
  .add-form.hidden{ display:none; }
  .add-form-row{ display:flex; gap:8px; flex-wrap: wrap; }
  .add-form select{
    background: var(--bg-raised); border:1px solid var(--line); color:var(--ink);
    padding: 9px 10px; border-radius:8px; font-size:12px; font-family:inherit; flex-shrink:0;
  }
  .add-form input[type=text]{
    flex:1; background: var(--bg-raised); border:1px solid var(--line); color:var(--ink);
    padding: 9px 12px; border-radius:8px; font-size:13px; font-family:inherit; min-width: 100px;
  }
  .add-form input[type=date], .add-form input[type=time]{
    background: var(--bg-raised); border:1px solid var(--line); color:var(--ink);
    padding: 9px 10px; border-radius:8px; font-size:12px; font-family:inherit; flex-shrink:0;
  }
  .add-form input:focus, .add-form select:focus{ outline:none; border-color:var(--accent); }
  .add-form-actions{ display:flex; gap:8px; justify-content:flex-end; }
  .btn-confirm{
    background: var(--accent); color:#0a1214; border:none; padding: 8px 16px;
    border-radius:8px; font-size:12px; font-weight:700; cursor:pointer;
  }
  .btn-confirm:hover{ background:#6ee6d6; }
  .btn-cancel-inline{
    background:none; border:1px solid var(--line); color: var(--ink-faint); padding: 8px 14px;
    border-radius:8px; font-size:12px; cursor:pointer;
  }
  .btn-cancel-inline:hover{ border-color: var(--line-bright); color: var(--ink-dim); }
  .field-hint{ font-size: 10px; color: var(--ink-faint); margin: 0; }

  .checklist-group-title{ font-size: 10px; letter-spacing: .5px; color: var(--ink-faint); margin: 14px 0 6px; text-transform: uppercase; }
  .checklist-group-title:first-child{ margin-top: 0; }

  .todo-item{ display:flex; align-items:flex-start; gap:10px; padding: 10px 6px; border-bottom: 1px solid var(--line); }
  .todo-item:last-child{ border-bottom:none; }
  .todo-check{
    width:19px; height:19px; border-radius: 6px; border: 1.5px solid var(--line-bright);
    flex-shrink:0; cursor:pointer; margin-top:1px; display:flex; align-items:center; justify-content:center;
    font-size: 11px; background: var(--bg-raised-2);
  }
  .todo-check.checked{ background: var(--accent); border-color: var(--accent); color: #0a1214; }
  .todo-text{ flex:1; font-size: 13px; line-height:1.5; word-break: break-word; }
  .todo-item.done .todo-text{ color: var(--ink-faint); text-decoration: line-through; }
  .todo-del{ background:none; border:none; color: var(--ink-faint); cursor:pointer; font-size: 16px; flex-shrink:0; padding: 0 2px; line-height:1; }
  .todo-del:hover{ color: var(--danger); }

  .reset-hint{ font-size: 10px; color: var(--ink-faint); margin-bottom: 10px; }
  .reset-btn{
    background: none; border: 1px solid var(--line); color: var(--ink-faint); font-size: 10px;
    padding: 5px 10px; border-radius: 20px; cursor: pointer; font-family: inherit;
  }
  .reset-btn:hover{ border-color: var(--accent); color: var(--accent); }

  .daily-subsection-title{ font-size: 11px; color: var(--ink-dim); font-weight:600; margin: 16px 0 6px; display:flex; justify-content:space-between; align-items:center; }
  .daily-subsection-title:first-child{ margin-top: 0; }

  .event-item{ padding: 12px 14px; border: 1px solid var(--line); border-radius: 10px; margin-bottom: 8px; background: var(--bg-raised-2); }
  .event-item:last-child{ margin-bottom: 0; }
  .event-top{ display:flex; justify-content:space-between; align-items:flex-start; gap:8px; }
  .event-name{ font-size: 13px; font-weight: 600; flex:1; }
  .event-days{ font-size: 11px; padding: 3px 10px; border-radius: 20px; white-space:nowrap; flex-shrink:0; }
  .event-days.urgent{ background: rgba(234,124,148,.18); color: var(--rose); }
  .event-days.soon{ background: rgba(240,184,85,.18); color: var(--amber); }
  .event-days.normal{ background: rgba(79,214,196,.15); color: var(--accent); }
  .event-days.expired{ background: rgba(86,105,108,.2); color: var(--ink-faint); }
  .event-date-row{ font-size: 11px; color: var(--ink-faint); margin-top: 6px; line-height: 1.6; }
  .event-del{ background:none; border:none; color: var(--ink-faint); cursor:pointer; font-size: 15px; padding: 0 2px; }
  .event-del:hover{ color: var(--danger); }

  .quest-item{
    border: 1px solid var(--line); border-radius: 10px; padding: 10px 12px; margin-bottom: 8px;
    background: var(--bg-raised-2);
  }
  .quest-item:last-child{ margin-bottom: 0; }
  .quest-top{ display:flex; align-items:flex-start; gap:8px; }
  .quest-check{
    width:19px; height:19px; border-radius: 6px; border: 1.5px solid var(--line-bright);
    flex-shrink:0; cursor:pointer; margin-top:1px; display:flex; align-items:center; justify-content:center;
    font-size: 11px; background: var(--bg-raised);
  }
  .quest-check.checked{ background: var(--accent); border-color: var(--accent); color: #0a1214; }
  .quest-text{ flex:1; font-size: 13px; line-height:1.5; }
  .quest-char-tag{
    font-size: 10px; color: var(--pink); background: rgba(240,168,204,.12); padding: 2px 8px;
    border-radius: 20px; flex-shrink:0; margin-top:1px;
  }
  .quest-del{ background:none; border:none; color: var(--ink-faint); cursor:pointer; font-size: 15px; flex-shrink:0; }
  .quest-del:hover{ color: var(--danger); }
  .view-history-link{
    display:inline-block; margin-top: 10px; font-size: 11px; color: var(--ink-faint);
    cursor: pointer; text-decoration: underline;
  }
  .view-history-link:hover{ color: var(--accent); }
  .history-item{ font-size: 12px; color: var(--ink-faint); padding: 8px 6px; border-bottom: 1px solid var(--line); text-decoration: line-through; }
  .history-item:last-child{ border-bottom: none; }

  .material-day-grid{ display:grid; grid-template-columns: repeat(auto-fill, minmax(120px,1fr)); gap: 8px; margin-bottom: 12px; }
  .material-day-box{
    border: 1px solid var(--line); border-radius: 10px; padding: 9px 10px; background: var(--bg-raised-2);
  }
  .material-day-box label{ display:block; font-size: 10px; color: var(--sapphire); font-weight:700; margin-bottom: 5px; }
  .material-day-box input{
    width:100%; background: var(--bg-raised); border:1px solid var(--line); color: var(--ink);
    padding: 6px 8px; border-radius: 6px; font-size: 12px; font-family: inherit;
  }
  .material-day-box input:focus{ outline:none; border-color: var(--sapphire); }
  .material-list-item{ display:flex; align-items:center; gap:8px; padding: 8px 6px; border-bottom: 1px solid var(--line); }
  .material-list-item:last-child{ border-bottom:none; }
  .material-check{
    width:19px; height:19px; border-radius: 6px; border: 1.5px solid var(--line-bright);
    flex-shrink:0; cursor:pointer; display:flex; align-items:center; justify-content:center;
    font-size: 11px; background: var(--bg-raised);
  }

<script>
(function(){
  'use strict';

  var STORAGE_KEY = 'save-log-games-v5';
  var OLD_KEYS = ['save-log-games-v4','save-log-games-v3','save-log-games-v2','save-log-games-v1'];

  var PLATFORMS = [
    { key: 'console',       label: 'Switch/主機',  short: '主機',    color: '#4fd6c4', group: 'console' },
    { key: 'steam',         label: 'Steam',        short: 'Steam',   color: '#a78cf2', group: 'console' },
    { key: 'mobile',        label: '一般向手遊',    short: '手遊',    color: '#f0b855', group: 'mobile' },
    { key: 'otome_mobile',  label: '乙女手遊',      short: '乙女手遊', color: '#f0a8cc', group: 'otome_mobile' },
    { key: 'otome_console', label: 'NS/主機乙女',   short: 'NS乙女',  color: '#6d9bf2', group: 'otome_console' }
  ];

  function platformInfo(key){
    for(var i=0;i<PLATFORMS.length;i++){ if(PLATFORMS[i].key===key) return PLATFORMS[i]; }
    return PLATFORMS[0];
  }
  function platformGroup(key){ return platformInfo(key).group; }

  var STATUS_OPTIONS = [
    { key: 'playing', label: '進行中', cls: 'status-playing' },
    { key: 'paused', label: '暫停', cls: 'status-paused' },
    { key: 'done', label: '通關', cls: 'status-done' },
    { key: 'backlog', label: '待玩', cls: 'status-backlog' }
  ];

  var TAG_OPTIONS = [
    { key: 'main', label: '主線' },
    { key: 'side', label: '支線' },
    { key: 'todo', label: '待辦' },
    { key: 'collect', label: '收集' }
  ];

  var ENDING_TYPES = [
    { key: 'TE', label: 'True End' },
    { key: 'GE', label: 'Good End' },
    { key: 'BE', label: 'Bad End' },
    { key: 'Other', label: '其他' }
  ];

  var WEEKDAYS = ['週一','週二','週三','週四','週五','週六','週日'];

  function uid(){ return Math.random().toString(36).slice(2,10); }
  function todayStr(){ return new Date().toISOString().slice(0,10); }
  function escapeHtml(str){
    var div = document.createElement('div');
    div.textContent = str == null ? '' : str;
    return div.innerHTML;
  }

  function makeGame(name, platform){
    var group = platformGroup(platform);
    var defaultTab = 'checklist';
    if(group === 'mobile' || group === 'otome_mobile' || group === 'otome_console') defaultTab = 'story';

    return {
      id: uid(),
      name: name,
      platform: platform,
      status: 'playing',
      progress: 0,
      currentQuest: '',
      notes: '',
      activeTab: defaultTab,
      todos: [],
      quests: [],
      questHistory: [],
      dailies: [],
      lastDailyReset: todayStr(),
      lastWeeklyReset: todayStr(),
      events: [],
      currency: { name1: '', val1: '', name2: '', val2: '', pullCost: '' },
      characters: [],
      cardNotes: '',
      endings: [],
      materialDays: { mon:'', tue:'', wed:'', thu:'', fri:'', sat:'', sun:'' },
      materialList: []
    };
  }

  function validTabsForGroup(grp){
    if(grp === 'console') return ['checklist','notes'];
    if(grp === 'mobile') return ['story','daily','materials','currency','notes'];
    if(grp === 'otome_mobile') return ['story','characters','daily','currency','notes'];
    if(grp === 'otome_console') return ['story','characters','endings','notes'];
    return ['checklist','notes'];
  }

  function migrate(games){
    games.forEach(function(g){
      if(!g.platform) g.platform = 'console';
      if(g.platform === 'otome') g.platform = 'otome_mobile';

      if(g.dailies === undefined) g.dailies = [];
      if(g.events === undefined) g.events = [];
      if(g.characters === undefined) g.characters = [];
      if(g.cardNotes === undefined) g.cardNotes = '';
      if(g.currency === undefined) g.currency = { name1:'', val1:'', name2:'', val2:'', pullCost:'' };
      if(g.currency.pullCost === undefined) g.currency.pullCost = '';
      if(g.lastDailyReset === undefined) g.lastDailyReset = todayStr();
      if(g.lastWeeklyReset === undefined) g.lastWeeklyReset = todayStr();
      if(g.quests === undefined) g.quests = [];
      if(g.questHistory === undefined) g.questHistory = [];
      if(g.endings === undefined) g.endings = [];
      if(g.materialDays === undefined) g.materialDays = { mon:'', tue:'', wed:'', thu:'', fri:'', sat:'', sun:'' };
      if(g.materialList === undefined) g.materialList = [];
      if(g.characters){
        g.characters.forEach(function(c){
          if(c.useAffection === undefined) c.useAffection = (c.affection !== undefined && c.affection !== null && c.affection !== '');
          if(c.affection === undefined) c.affection = 0;
          if(c.route === undefined) c.route = '';
        });
      }
      var grp = platformGroup(g.platform);
      var validTabs = validTabsForGroup(grp);
      if(!g.activeTab || validTabs.indexOf(g.activeTab) === -1){
        g.activeTab = validTabs[0];
      }
      g.events.forEach(function(ev){
        if(ev.refreshDateTime === undefined){
          ev.refreshDateTime = ev.endDate ? (ev.endDate + 'T23:59') : '';
        }
      });
    });
    return games;
  }

  function loadGames(){
    try{
      var raw = localStorage.getItem(STORAGE_KEY);
      if(raw) return migrate(JSON.parse(raw));
      for(var i=0;i<OLD_KEYS.length;i++){
        var old = localStorage.getItem(OLD_KEYS[i]);
        if(old){
          var parsed = JSON.parse(old);
          return migrate(parsed.map(function(g){ if(!g.platform) g.platform='console'; return g; }));
        }
      }
    }catch(e){}
    return [];
  }

  var state = {
    games: loadGames(),
    activeId: null,
    filterPlatform: 'all',
    drawerOpen: false,
    view: 'home'
  };

  var cloudUser = null;
  var cloudSyncStatus = 'local';
  var cloudUnsub = null;
  var applyingRemoteUpdate = false;
  var pushDebounceTimer = null;

  (function autoReset(){
    var today = todayStr();
    var dayOfWeek = new Date().getDay();
    state.games.forEach(function(g){
      if(g.lastDailyReset !== today){
        g.dailies.forEach(function(d){ if(d.freq==='daily') d.done = false; });
        g.lastDailyReset = today;
      }
      if(dayOfWeek === 1 && g.lastWeeklyReset !== today){
        g.dailies.forEach(function(d){ if(d.freq==='weekly') d.done = false; });
        g.lastWeeklyReset = today;
      }
    });
  })();

  function saveState(){
    try{
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state.games));
      pulseSaved();
    }catch(e){}
    schedulePushToCloud();
  }
  function pulseSaved(){ /* visual save cue lives in drawer auth badge only now */ }

  function schedulePushToCloud(){
    if(applyingRemoteUpdate) return;
    if(!cloudUser || !window.__fb) return;
    if(pushDebounceTimer) clearTimeout(pushDebounceTimer);
    pushDebounceTimer = setTimeout(pushToCloudNow, 600);
  }

  function pushToCloudNow(){
    if(!cloudUser || !window.__fb) return;
    cloudSyncStatus = 'syncing';
    renderDrawerAuth();
    var ref = window.__fb.doc(window.__fb.db, 'users', cloudUser.uid, 'data', 'games');
    window.__fb.setDoc(ref, { games: state.games, updatedAt: Date.now() })
      .then(function(){ cloudSyncStatus = 'synced'; renderDrawerAuth(); })
      .catch(function(err){ console.error('雲端同步失敗', err); cloudSyncStatus = 'local'; renderDrawerAuth(); });
  }

  function startCloudListener(user){
    if(cloudUnsub){ cloudUnsub(); cloudUnsub = null; }
    var ref = window.__fb.doc(window.__fb.db, 'users', user.uid, 'data', 'games');
    cloudSyncStatus = 'syncing';
    renderDrawerAuth();
    cloudUnsub = window.__fb.onSnapshot(ref, function(snap){
      if(snap.exists()){
        var data = snap.data();
        if(data && Array.isArray(data.games)){
          applyingRemoteUpdate = true;
          state.games = migrate(data.games);
          if(!state.games.find(function(g){ return g.id === state.activeId; })){
            state.activeId = state.games.length ? state.games[0].id : null;
          }
          try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(state.games)); }catch(e){}
          renderCurrentView();
          applyingRemoteUpdate = false;
        }
      } else {
        pushToCloudNow();
      }
      cloudSyncStatus = 'synced';
      renderDrawerAuth();
    }, function(err){
      console.error('雲端讀取失敗', err);
      cloudSyncStatus = 'local';
      renderDrawerAuth();
    });
  }

  function stopCloudListener(){
    if(cloudUnsub){ cloudUnsub(); cloudUnsub = null; }
    cloudSyncStatus = 'local';
  }

  function renderDrawerAuth(){
    var el = document.getElementById('drawerAuthArea');
    if(!el) return;
    if(!window.__fb){ el.innerHTML = ''; return; }
    if(cloudUser){
      var badge = cloudSyncStatus === 'synced'
        ? '<span class="sync-badge synced">已同步雲端</span>'
        : cloudSyncStatus === 'syncing'
          ? '<span class="sync-badge syncing">同步中...</span>'
          : '<span class="sync-badge local">僅本機</span>';
      var photo = cloudUser.photoURL ? '<img src="' + cloudUser.photoURL + '" alt="">' : '';
      el.innerHTML =
        '<div class="drawer-auth-signedin">' + photo +
          '<div class="drawer-auth-info">' +
            '<div class="drawer-auth-name">' + escapeHtml(cloudUser.displayName || cloudUser.email || '已登入') + '</div>' +
            badge +
          '</div>' +
          '<button class="drawer-signout-btn" id="drawerSignOutBtn">登出</button>' +
        '</div>';
      var btn = document.getElementById('drawerSignOutBtn');
      if(btn) btn.addEventListener('click', function(){ window.__fb.signOutUser(); });
    } else {
      el.innerHTML =
        '<div class="drawer-auth-signedout">' +
          '<p>登入 Google 帳號，讓進度在手機、電腦之間自動同步</p>' +
          '<button class="google-signin-btn" id="drawerSignInBtn">用 Google 帳號登入</button>' +
        '</div>';
      var btn2 = document.getElementById('drawerSignInBtn');
      if(btn2) btn2.addEventListener('click', function(){ window.__fb.signIn().catch(function(err){ console.error(err); }); });
    }
  }

  function getActiveGame(){
    for(var i=0;i<state.games.length;i++){
      if(state.games[i].id === state.activeId) return state.games[i];
    }
    return null;
  }

  function updateGame(id, patch){
    var g = null;
    for(var i=0;i<state.games.length;i++){
      if(state.games[i].id === id){ g = state.games[i]; break; }
    }
    if(!g) return;
    Object.assign(g, patch);

  function getSafeDeadline(refreshDateTime){
    if(!refreshDateTime) return null;
    var refresh = new Date(refreshDateTime);
    if(isNaN(refresh.getTime())) return null;
    var refreshHour = refresh.getHours() + refresh.getMinutes()/60;
    var safeDeadline = new Date(refresh);
    if(refreshHour < 12){
      safeDeadline.setDate(safeDeadline.getDate() - 1);
    }
    safeDeadline.setHours(23,59,59,999);
    return safeDeadline;
  }
  function daysUntilSafe(refreshDateTime){
    var deadline = getSafeDeadline(refreshDateTime);
    if(!deadline) return null;
    var now = new Date();
    return Math.ceil((deadline - now) / (1000*60*60*24));
  }
  function formatDateTimeShort(dtStr){
    if(!dtStr) return '未設定';
    var d = new Date(dtStr);
    if(isNaN(d.getTime())) return '未設定';
    var mm = d.getMonth()+1, dd = d.getDate();
    var hh = String(d.getHours()).padStart(2,'0'), mi = String(d.getMinutes()).padStart(2,'0');
    return mm + '/' + dd + ' ' + hh + ':' + mi;
  }
  function eventBadge(days){
    if(days === null) return { cls: 'expired', text: '未設定時間' };
    if(days < 0) return { cls: 'expired', text: '已結束' };
    if(days === 0) return { cls: 'urgent', text: '今天是最後準備日' };
    if(days <= 3) return { cls: 'urgent', text: '剩 ' + days + ' 天' };
    if(days <= 7) return { cls: 'soon', text: '剩 ' + days + ' 天' };
    return { cls: 'normal', text: '剩 ' + days + ' 天' };
  }
  function nearestEventFor(g){
    var nearest = null, nearestDays = null;
    g.events.forEach(function(ev){
      var d = daysUntilSafe(ev.refreshDateTime);
      if(d !== null && d >= 0 && (nearestDays === null || d < nearestDays)){
        nearestDays = d; nearest = ev;
      }
    });
    return nearest ? { event: nearest, days: nearestDays } : null;
  }

  function renderGachaResult(g){
    var area = document.getElementById('gachaResultArea');
    if(!area) return;
    var have = parseFloat(g.currency.val1);
    var cost = parseFloat(g.currency.pullCost);
    if(isNaN(have) || isNaN(cost) || cost <= 0){
      area.innerHTML = '<p class="field-hint" style="margin-top:10px;">輸入「目前數量」與「一抽消耗」後，這裡會自動算出可以抽幾次。</p>';
      return;
    }
    var pulls = Math.floor(have / cost);
    var remainder = Math.round((have - pulls * cost) * 100) / 100;
    var resourceName = g.currency.name1 || '資源';
    area.innerHTML =
      '<div class="gacha-result">' +
        '<div class="big-num">' + pulls + ' 抽</div>' +
        '<div class="sub">目前 ' + have + ' ' + escapeHtml(resourceName) + '，可以抽 ' + pulls + ' 次</div>' +
        '<div class="remainder">抽完後剩餘 ' + remainder + ' ' + escapeHtml(resourceName) + '</div>' +
      '</div>';
  }

    addModal.classList.remove('hidden');
    newGameNameInput.value = '';
    selectedPlatform = (state.filterPlatform !== 'all') ? state.filterPlatform : 'console';
    renderPlatformPick();
    setTimeout(function(){ newGameNameInput.focus(); }, 0);
  }
  document.getElementById('cancelAddBtn').addEventListener('click', function(){ addModal.classList.add('hidden'); });
  addModal.addEventListener('click', function(e){ if(e.target === addModal) addModal.classList.add('hidden'); });
  function submitNewGame(){
    var name = newGameNameInput.value.trim();
    if(!name) return;
    var newGame = makeGame(name, selectedPlatform);
    state.games.push(newGame);
    saveState();
    addModal.classList.add('hidden');
    goToGame(newGame.id);
  }
  document.getElementById('confirmAddBtn').addEventListener('click', submitNewGame);
  newGameNameInput.addEventListener('keydown', function(e){ if(e.key === 'Enter') submitNewGame(); });

  var editModal = document.getElementById('editModal');
  var editGameNameInput = document.getElementById('editGameNameInput');
  var editSelectedPlatform = 'console';
  var editingGameId = null;

  function renderEditPlatformPick(){
    renderPlatformPickInto('editPlatformPick', editSelectedPlatform, function(key){
      editSelectedPlatform = key;
      renderEditPlatformPick();
    });
  }

  function openEditModal(g){
    editingGameId = g.id;
    editGameNameInput.value = g.name;
    editSelectedPlatform = g.platform;
    renderEditPlatformPick();
    editModal.classList.remove('hidden');
  }
  document.getElementById('cancelEditBtn').addEventListener('click', function(){ editModal.classList.add('hidden'); });
  editModal.addEventListener('click', function(e){ if(e.target === editModal) editModal.classList.add('hidden'); });
  document.getElementById('confirmEditBtn').addEventListener('click', function(){
    var name = editGameNameInput.value.trim();
    if(!name || !editingGameId) return;
    var g = state.games.filter(function(x){return x.id===editingGameId;})[0];
    if(!g) return;
    var oldGroup = platformGroup(g.platform);
    var newGroup = platformGroup(editSelectedPlatform);
    g.name = name;
    g.platform = editSelectedPlatform;
    if(oldGroup !== newGroup){
      var validTabs = validTabsForGroup(newGroup);
      g.activeTab = validTabs[0];
    }
    saveState();
    editModal.classList.add('hidden');
    renderGameView();
  });

  var deleteModal = document.getElementById('deleteModal');
  var pendingDeleteId = null;
  function openDeleteModal(g){
    pendingDeleteId = g.id;
    document.getElementById('deleteConfirmText').textContent = '確定要刪除「' + g.name + '」的所有進度與筆記嗎？此操作無法復原。';
    deleteModal.classList.remove('hidden');
  }
  document.getElementById('cancelDeleteBtn').addEventListener('click', function(){ deleteModal.classList.add('hidden'); pendingDeleteId = null; });
  deleteModal.addEventListener('click', function(e){ if(e.target === deleteModal){ deleteModal.classList.add('hidden'); pendingDeleteId = null; } });
  document.getElementById('confirmDeleteBtn').addEventListener('click', function(){
    if(!pendingDeleteId) return;
    state.games = state.games.filter(function(g){ return g.id !== pendingDeleteId; });
    pendingDeleteId = null;
    saveState();
    deleteModal.classList.add('hidden');
    goHome();
  });

  goHome();

  function wireFirebaseAuth(){
    if(!window.__fb) return;
    window.__fb.onAuthStateChanged(function(user){
      cloudUser = user;
      if(user){ startCloudListener(user); } else { stopCloudListener(); }
      renderDrawerAuth();
    });
  }
  if(window.__fb){ wireFirebaseAuth(); }
  else { window.addEventListener('fb-ready', wireFirebaseAuth, { once: true }); }
})();
</script>
</body>
</html>
