<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>遊跡 · 遊戲進度與筆記</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Noto+Sans+TC:wght@400;500;700;900&display=swap');

  :root{
    --bg: #f6f1e7;
    --card: #ffffff;
    --card-soft: #fbf7ef;
    --line: #ece3d2;
    --line-strong: #ddd0b5;
    --ink: #2e2a24;
    --ink-dim: #6f6656;
    --ink-faint: #a79c86;
    --accent: #ff6f59;
    --accent-dark: #e85a45;
    --accent-soft: rgba(255,111,89,.12);
    --teal: #23b892;
    --teal-soft: rgba(35,184,146,.13);
    --sapphire: #4c8dff;
    --sapphire-soft: rgba(76,141,255,.12);
    --amber: #f5a623;
    --amber-soft: rgba(245,166,35,.15);
    --rose: #ef5d80;
    --rose-soft: rgba(239,93,128,.13);
    --violet: #8f6fe8;
    --violet-soft: rgba(143,111,232,.13);
    --pink: #ef7fb0;
    --pink-soft: rgba(239,127,176,.13);
    --danger: #ef5d80;
    --shadow-sm: 0 1px 3px rgba(60,40,20,.05), 0 1px 2px rgba(60,40,20,.04);
    --shadow-md: 0 4px 16px rgba(60,40,20,.07);
  }

  *{ box-sizing: border-box; }
  html,body{ margin:0; padding:0; }
  body{
    background: var(--bg);
    color: var(--ink);
    font-family: 'Noto Sans TC', 'Space Grotesk', -apple-system, sans-serif;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  .display{ font-family: 'Space Grotesk', 'Noto Sans TC', sans-serif; }
  ::selection{ background: var(--accent-soft); color: var(--accent-dark); }
  ::-webkit-scrollbar{ width: 9px; height: 9px; }
  ::-webkit-scrollbar-track{ background: transparent; }
  ::-webkit-scrollbar-thumb{ background: var(--line-strong); border-radius: 6px; }

  .app{ max-width: 880px; margin: 0 auto; padding: 20px 16px 90px; }

  /* ---------- Home header ---------- */
  .home-header{
    display:flex; align-items:center; justify-content:space-between;
    gap: 12px; flex-wrap: wrap;
    padding: 6px 2px 20px;
    margin-bottom: 6px;
  }
  .home-header-left{ display:flex; align-items:center; gap: 13px; min-width:0; }
  .hamburger-btn{
    width: 44px; height: 44px; flex-shrink:0;
    background: var(--card); border: 1px solid var(--line); border-radius: 14px;
    cursor: pointer; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:4px;
    transition: all .15s ease; box-shadow: var(--shadow-sm);
  }
  .hamburger-btn:hover{ border-color: var(--accent); transform: translateY(-1px); }
  .hamburger-btn:active{ transform: scale(0.96); }
  .hamburger-btn span{ width: 18px; height: 2px; background: var(--ink-dim); border-radius: 1px; transition: background .15s ease; }
  .hamburger-btn:hover span{ background: var(--accent); }

  .brand-row{ display:flex; align-items:center; gap:8px; }
  .brand-icon{ font-size: 22px; line-height:1; }
  .brand-title{ font-size: 19px; font-weight: 700; letter-spacing: 0.2px; margin: 0; color: var(--ink); }
  .brand-sub{ margin:2px 0 0; color: var(--ink-faint); font-size: 12px; }

  .platform-filter{ display:flex; flex-wrap:wrap; gap:7px; margin-bottom: 18px; }
  .filter-chip{
    font-size: 12px; padding: 7px 14px; border-radius: 20px; border: 1px solid var(--line);
    color: var(--ink-dim); cursor:pointer; background: var(--card); font-family: inherit;
    transition: all .15s ease; font-weight: 500;
  }
  .filter-chip:hover{ border-color: var(--line-strong); }
  .filter-chip.active{ border-color: var(--accent); color: var(--accent-dark); background: var(--accent-soft); font-weight: 700; }

  /* ---------- Home grid ---------- */
  .home-grid{ display:flex; flex-direction:column; gap: 12px; }
  .overview-card{
    background: var(--card); border: 1px solid var(--line); border-radius: 18px;
    padding: 16px 18px; cursor: pointer; transition: all .15s ease;
    position: relative; overflow: hidden; box-shadow: var(--shadow-sm);
  }
  .overview-card:hover{ box-shadow: var(--shadow-md); transform: translateY(-1px); border-color: var(--line-strong); }
  .overview-card:active{ transform: scale(0.995); }
  .overview-accent-bar{ position:absolute; left:0; top:0; bottom:0; width:4px; border-radius: 4px 0 0 4px; }
  .overview-top{ display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom: 6px; }
  .overview-name-wrap{ display:flex; align-items:center; gap:9px; min-width:0; }
  .overview-name{ font-size: 15px; font-weight: 700; color: var(--ink); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .overview-platform-tag{ font-size: 11px; color: var(--ink-faint); flex-shrink:0; font-weight: 500; }
  .overview-status{ font-size: 11px; padding: 4px 11px; border-radius: 20px; white-space:nowrap; flex-shrink:0; font-weight: 700; }
  .status-playing{ background: var(--teal-soft); color: var(--teal); }
  .status-paused{ background: var(--amber-soft); color: var(--amber); }
  .status-done{ background: var(--violet-soft); color: var(--violet); }
  .status-backlog{ background: #efece4; color: var(--ink-faint); }

  .overview-sub{ font-size: 12.5px; color: var(--ink-dim); margin-bottom: 9px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .progress-track{ height: 6px; background: var(--line); border-radius: 4px; overflow:hidden; margin-bottom: 9px; }
  .progress-fill{ height:100%; border-radius: 4px; }

  .overview-badge-row{ display:flex; flex-wrap:wrap; gap: 6px; }
  .overview-badge{
    font-size: 11px; padding: 4px 10px; border-radius: 20px; display:inline-flex; align-items:center; gap:4px; font-weight: 600;
  }
  .overview-badge.daily{ color: var(--rose); background: var(--rose-soft); }
  .overview-badge.event-urgent{ color: var(--rose); background: var(--rose-soft); }
  .overview-badge.event-soon{ color: var(--amber); background: var(--amber-soft); }
  .overview-badge.event-normal{ color: var(--teal); background: var(--teal-soft); }

  .add-game-btn{
    width:100%; margin-top: 4px; padding: 16px; background: var(--card);
    border: 1.5px dashed var(--line-strong); color: var(--ink-dim); border-radius: 18px;
    font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit; transition: all .15s ease;
  }
  .add-game-btn:hover{ border-color: var(--accent); color: var(--accent-dark); background: var(--accent-soft); }
  .empty-hint{ text-align:center; padding: 34px 10px; color: var(--ink-faint); font-size:13px; }

  .empty-state{ text-align:center; padding: 70px 20px; }
  .empty-state-icon{ font-size: 44px; margin-bottom: 14px; }
  .empty-state-title{ font-size: 16px; color: var(--ink); margin-bottom: 8px; font-weight: 700; }
  .empty-state-sub{ color: var(--ink-faint); font-size:13px; }

  /* ---------- Drawer ---------- */
  .drawer-overlay{
    position: fixed; inset: 0; background: rgba(46,42,36,.35); z-index: 60;
    opacity: 0; pointer-events: none; transition: opacity .2s ease;
    backdrop-filter: blur(2px);
  }
  .drawer-overlay.open{ opacity: 1; pointer-events: auto; }
  .drawer{
    position: fixed; top:0; left:0; bottom:0; width: 310px; max-width: 88vw;
    background: var(--bg); border-right: 1px solid var(--line);
    z-index: 61; transform: translateX(-100%); transition: transform .25s cubic-bezier(.2,.8,.2,1);
    display:flex; flex-direction:column;
  }
  .drawer.open{ transform: translateX(0); }

  .drawer-auth{
    padding: 20px 18px; background: linear-gradient(160deg, var(--accent-soft), transparent);
    border-bottom: 1px solid var(--line);
  }
  .drawer-auth-signedout{ text-align:center; }
  .drawer-auth-signedout p{ font-size: 12.5px; color: var(--ink-dim); margin: 0 0 12px; line-height:1.5; }
  .google-signin-btn{
    width: 100%; background: var(--ink); color: #fff; border:none; padding: 12px;
    border-radius: 12px; font-size: 13px; font-weight: 700; cursor:pointer; font-family: inherit;
    display:flex; align-items:center; justify-content:center; gap:8px; transition: opacity .15s ease;
  }
  .google-signin-btn:hover{ opacity: .85; }
  .drawer-auth-signedin{ display:flex; align-items:center; gap: 10px; }
  .drawer-auth-signedin img{ width:38px; height:38px; border-radius:50%; flex-shrink:0; }
  .drawer-auth-info{ flex:1; min-width:0; }
  .drawer-auth-name{ font-size: 13.5px; font-weight:700; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .sync-badge{ font-size: 10px; padding: 2px 8px; border-radius: 20px; display:inline-block; margin-top:4px; font-weight: 600; }
  .sync-badge.synced{ background: var(--teal-soft); color: var(--teal); }
  .sync-badge.local{ background: #efece4; color: var(--ink-faint); }
  .sync-badge.syncing{ background: var(--amber-soft); color: var(--amber); }
  .drawer-signout-btn{
    background:none; border: 1px solid var(--line-strong); color: var(--ink-dim); font-size: 11.5px;
    padding: 7px 11px; border-radius: 10px; cursor:pointer; font-family: inherit; flex-shrink:0; font-weight: 600;
  }
  .drawer-signout-btn:hover{ border-color: var(--danger); color: var(--danger); }

  .drawer-header{ display:flex; align-items:center; justify-content:space-between; padding: 16px 18px 10px; }
  .drawer-header h2{ font-size: 12px; letter-spacing: .5px; color: var(--ink-faint); margin:0; text-transform: uppercase; font-weight: 700; }
  .drawer-close{
    width: 32px; height:32px; background: var(--card); border:1px solid var(--line); color: var(--ink-dim);
    border-radius: 10px; cursor:pointer; font-size: 14px;
  }
  .drawer-close:hover{ border-color: var(--rose); color: var(--rose); }
  .drawer-body{ flex:1; overflow-y: auto; padding: 4px 18px 18px; }

  .drawer-nav-btn{
    width:100%; text-align:left; background: var(--card); border: 1px solid var(--line); color: var(--ink);
    padding: 12px 14px; border-radius: 12px; cursor:pointer; font-size: 13.5px; font-family: inherit;
    display:flex; align-items:center; gap:8px; margin-bottom: 12px; font-weight: 600;
  }
  .drawer-nav-btn:hover{ border-color: var(--line-strong); }

  .game-card{
    display:flex; flex-direction:column; gap:6px; padding: 11px 12px; border-radius: 12px;
    border: 1px solid transparent; cursor: pointer; margin-bottom: 6px;
    transition: all .12s ease; position: relative; background: var(--card);
  }
  .game-card:hover{ border-color: var(--line); }
  .game-card.active{ border-color: var(--accent); background: var(--accent-soft); }
  .game-card-top{ display:flex; align-items:center; justify-content:space-between; gap:8px; }
  .game-name-wrap{ display:flex; align-items:center; gap:8px; min-width:0; }
  .platform-dot{ width:8px; height:8px; border-radius:50%; flex-shrink:0; }
  .game-name{ font-size: 13.5px; font-weight:600; color: var(--ink); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }

  /* ---------- Game-mode topbar (minimal chrome) ---------- */
  .game-topbar{
    display:flex; align-items:center; gap: 10px; margin-bottom: 14px;
  }
  .back-btn{
    width: 38px; height: 38px; flex-shrink:0; background: var(--card); border: 1px solid var(--line);
    border-radius: 12px; cursor:pointer; display:flex; align-items:center; justify-content:center;
    color: var(--ink-dim); font-size: 17px; transition: all .15s ease; box-shadow: var(--shadow-sm);
  }
  .back-btn:hover{ border-color: var(--accent); color: var(--accent-dark); }
  .game-topbar-title{ font-size: 13px; color: var(--ink-faint); flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; font-weight: 500; }

  .game-hero{

  function getSafeDeadline(refreshDateTime){
    if(!refreshDateTime) return null;
    var refresh = new Date(refreshDateTime);
    if(isNaN(refresh.getTime())) return null;
    var refreshHour = refresh.getHours() + refresh.getMinutes()/60;
    var safeDeadline = new Date(refresh);
    if(refreshHour < 12){ safeDeadline.setDate(safeDeadline.getDate() - 1); }
    safeDeadline.setHours(23,59,59,999);
    return safeDeadline;
  }
  function daysUntilSafe(refreshDateTime){
    var deadline = getSafeDeadline(refreshDateTime);
    if(!deadline) return null;
    var now = new Date();
    return Math.ceil((deadline - now) / (1000*60*60*24));
  }
  function formatDateTimeShort(dtStr){
    if(!dtStr) return '未設定';
    var d = new Date(dtStr);
    if(isNaN(d.getTime())) return '未設定';
    var mm = d.getMonth()+1, dd = d.getDate();
    var hh = String(d.getHours()).padStart(2,'0'), mi = String(d.getMinutes()).padStart(2,'0');
    return mm + '/' + dd + ' ' + hh + ':' + mi;
  }
  function eventBadge(days){
    if(days === null) return { cls: 'expired', text: '未設定時間' };
    if(days < 0) return { cls: 'expired', text: '已結束' };
    if(days === 0) return { cls: 'urgent', text: '今天是最後準備日' };
    if(days <= 3) return { cls: 'urgent', text: '剩 ' + days + ' 天' };
    if(days <= 7) return { cls: 'soon', text: '剩 ' + days + ' 天' };
    return { cls: 'normal', text: '剩 ' + days + ' 天' };
  }
  function nearestEventFor(g){
    var nearest = null, nearestDays = null;
    g.events.forEach(function(ev){
      var d = daysUntilSafe(ev.refreshDateTime);
      if(d !== null && d >= 0 && (nearestDays === null || d < nearestDays)){
        nearestDays = d; nearest = ev;
      }
    });
    return nearest ? { event: nearest, days: nearestDays } : null;
  }

    if(isNaN(have) || isNaN(cost) || cost <= 0){
      area.innerHTML = '<p class="field-hint" style="margin-top:11px;">輸入「目前數量」與「一抽消耗」後，這裡會自動算出可以抽幾次。</p>';
      return;
    }
    var pulls = Math.floor(have / cost);
    var remainder = Math.round((have - pulls * cost) * 100) / 100;
    var resourceName = g.currency.name1 || '資源';
    area.innerHTML =
      '<div class="gacha-result">' +

      '</div>';
  }
